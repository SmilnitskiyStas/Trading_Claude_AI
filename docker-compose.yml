services:

  # ── INFRASTRUCTURE ─────────────────────────────────────────────────────

  redis:
    image: redis:7-alpine
    container_name: trading_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  postgres:
    image: postgres:16-alpine
    container_name: trading_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: trading
      POSTGRES_USER: trader
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-trading_pass}
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5433:5432"   # 5433 on host (avoids conflict with local postgres on Windows)
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/utils/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trader -d trading"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── APPLICATION (paper_trade + dashboard in one process) ───────────────

  trader:
    build:
      context: .
      dockerfile: Dockerfile
    image: trading_bot:latest
    container_name: trading_bot
    restart: unless-stopped
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://trader:${POSTGRES_PASSWORD:-trading_pass}@postgres:5432/trading
      - DASHBOARD_HOST=0.0.0.0
      - DASHBOARD_PORT=8080
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    command: python main.py --mode all
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2'
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ── DEBUG (run with: docker compose --profile debug up) ────────────────

  redis_commander:
    image: rediscommander/redis-commander:latest
    container_name: trading_redis_ui
    restart: unless-stopped
    environment:
      - REDIS_HOSTS=local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      - redis
    profiles:
      - debug

volumes:
  redis_data:
  postgres_data:
